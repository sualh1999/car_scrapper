<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Info</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #333;
            --muted-text-color: #6c757d;
            --border-color: #dee2e6;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .search-form {
            display: flex;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border-radius: 8px;
            overflow: hidden;
        }

        .search-form input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-right: none;
            font-size: 16px;
        }
        .search-form input[type="text"]:focus {
            outline: 2px solid var(--primary-color);
        }

        .search-form button {
            padding: 12px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        .search-form button:hover {
            background-color: var(--primary-hover);
        }

        .car-card {
            background: var(--card-background);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .car-header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        .car-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        .car-header small {
            font-size: 1rem;
            opacity: 0.8;
        }

        .car-body {
            padding: 1.5rem;
        }

        .detail-item {
            padding: 10px;
            border-radius: 6px;
            background-color: #f1f3f5;
        }
        .detail-item strong {
            display: block;
            color: var(--muted-text-color);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .price-section p {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
        }
        .price-section strong {
           color: var(--primary-color);
        }

        .additional-info ul {
            padding-left: 20px;
            margin: 0;
        }
        .additional-info li {
            margin-bottom: 0.5rem;
        }

        .source-link-container {
            text-align: center;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            margin-top: 1.5rem;
        }

        .source-link-button {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .source-link-button:hover {
            background-color: var(--primary-hover);
        }

        .not-found, .error {
            background-color: #fff3cd;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            color: #664d03;
            border: 1px solid #ffecb5;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Car Intel</h1>
        <form action="/car" method="get" class="search-form">
            <input type="text" name="car_id" placeholder="Enter Car ID (e.g., C13s)" value="__CAR_ID_VALUE__">
            <button type="submit">Search</button>
        </form>
        __RESULTS__
    </div>
</body>
</html>
